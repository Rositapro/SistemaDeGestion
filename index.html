<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión de Accesos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container vh-center">
        <div class="card card-login p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-circle display-4"></i>
                <h3>Iniciar Sesión</h3>
            </div>
            <form action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" required placeholder="correo@ejemplo.com">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" required placeholder="********">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Entrar <i class="bi bi-box-arrow-in-right ms-1"></i>
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="registro.html" class="text-decoration-none">Registrar nuevo usuario</a>
            </div>
        </div>
    </div>
</body>
</html>
